<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 내역 — 토스증권 스타일</title>
    <meta name="description" content="주문 체결·미체결·취소 내역 조회 데모" />
    <meta name="theme-color" content="#3182f6" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' ; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="토스증권 스타일 데모" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://zeniperfall.github.io/TOSSINVEST/history.html" />
    <meta property="og:title" content="주문 내역 — 토스증권 스타일" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="주문 체결·미체결·취소 내역 조회 데모" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a href="./home.html" class="logo" aria-label="토스증권">
          <span class="logo__mark">toss</span><span class="logo__sub">증권</span>
        </a>
        <nav class="gnb">
          <a class="gnb__item" data-page="home" href="./home.html" data-i18n="nav.home">홈</a>
          <a class="gnb__item" data-page="stock" href="./index.html" data-i18n="nav.stock">주식</a>
          <a class="gnb__item" data-page="search" href="./search.html" data-i18n="nav.search"
            >검색</a
          >
          <a
            class="gnb__item"
            data-page="portfolio"
            href="./portfolio.html"
            data-i18n="nav.portfolio"
            >내 자산</a
          >
          <a
            class="gnb__item gnb__item--active"
            data-page="history"
            href="./history.html"
            data-i18n="nav.history"
            >주문 내역</a
          >
        </nav>
        <div class="topbar__right">
          <label class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path
                d="m20 20-3.5-3.5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <input
              id="globalSearch"
              type="search"
              placeholder="종목명·티커 검색"
              data-i18n-placeholder="topbar.searchPlaceholder"
            />
          </label>
          <button class="btn btn--ghost btn--xs" data-locale-toggle aria-label="Locale">KO</button>
          <button class="iconbtn" data-theme-toggle aria-label="테마 전환" aria-pressed="false">
            <span data-theme-icon>🌙</span>
          </button>
          <button class="btn btn--ghost" data-i18n="topbar.login">로그인</button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <section class="search-hero">
          <h1 data-i18n="history.title">주문 내역</h1>
          <div class="filter-row">
            <button class="chip chip--active" data-filter="all" data-i18n="history.filterAll">
              전체
            </button>
            <button class="chip" data-filter="체결" data-i18n="history.filterFilled">체결</button>
            <button class="chip" data-filter="미체결" data-i18n="history.filterPending">
              미체결
            </button>
            <button class="chip" data-filter="취소" data-i18n="history.filterCanceled">취소</button>
            <button class="chip" data-filter="buy" data-i18n="history.filterBuy">구매</button>
            <button class="chip" data-filter="sell" data-i18n="history.filterSell">판매</button>
          </div>
        </section>

        <section class="card">
          <h2 class="card__title">
            <span data-i18n="history.heading">내역</span>
            <span class="muted small" id="historyCount"></span>
          </h2>
          <div class="table-scroll">
            <table class="holdings-table" id="historyTable">
              <thead>
                <tr>
                  <th data-i18n="history.col.placedAt">주문 시각</th>
                  <th data-i18n="portfolio.col.stock">종목</th>
                  <th data-i18n="history.col.side">구분</th>
                  <th data-i18n="history.col.type">유형</th>
                  <th data-i18n="portfolio.col.qty">수량</th>
                  <th data-i18n="history.col.price">주문 가격</th>
                  <th data-i18n="history.col.status">상태</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <footer class="foot">
      <div class="foot__inner" data-i18n="foot.demo">학습용 데모 · 토스증권 디자인 스타일</div>
    </footer>

    <script type="module" src="./assets/history.js"></script>
    <script type="module" src="./assets/pwa.js"></script>
    <script type="module" src="./assets/web-vitals.js"></script>
  </body>
</html>
