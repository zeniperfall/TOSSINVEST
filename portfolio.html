<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 자산 — 토스증권 스타일</title>
    <meta name="theme-color" content="#3182f6" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' ; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="토스증권 스타일 데모" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://zeniperfall.github.io/TOSSINVEST/portfolio.html" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a href="./home.html" class="logo" aria-label="토스증권">
          <span class="logo__mark">toss</span><span class="logo__sub">증권</span>
        </a>
        <nav class="gnb">
          <a class="gnb__item" data-page="home" href="./home.html" data-i18n="nav.home">홈</a>
          <a class="gnb__item" data-page="stock" href="./index.html" data-i18n="nav.stock">주식</a>
          <a class="gnb__item" data-page="search" href="./search.html" data-i18n="nav.search"
            >검색</a
          >
          <a class="gnb__item gnb__item--active" data-page="portfolio" href="./portfolio.html"
            >내 자산</a
          >
          <a class="gnb__item" data-page="history" href="./history.html" data-i18n="nav.history"
            >주문 내역</a
          >
        </nav>
        <div class="topbar__right">
          <label class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path
                d="m20 20-3.5-3.5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <input
              id="globalSearch"
              type="search"
              placeholder="종목명·티커 검색"
              data-i18n-placeholder="topbar.searchPlaceholder"
            />
          </label>
          <button class="btn btn--ghost btn--xs" data-locale-toggle aria-label="Locale">KO</button>
          <button class="iconbtn" data-theme-toggle aria-label="테마 전환" aria-pressed="false">
            <span data-theme-icon>🌙</span>
          </button>
          <button class="btn btn--ghost" data-i18n="topbar.login">로그인</button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <section class="card portfolio-summary">
          <div>
            <div class="muted">총 평가 금액</div>
            <div class="portfolio-summary__value" id="totalValue">—</div>
            <div class="portfolio-summary__pnl" id="totalPnl">—</div>
          </div>
          <div class="portfolio-summary__pie">
            <div class="pie" id="pie"></div>
            <ul class="pie-legend" id="pieLegend"></ul>
          </div>
        </section>

        <section class="card">
          <h2 class="card__title">보유 종목</h2>
          <div class="table-scroll">
            <table class="holdings-table">
              <thead>
                <tr>
                  <th>종목</th>
                  <th>수량</th>
                  <th>평균 단가</th>
                  <th>현재가</th>
                  <th>평가 금액</th>
                  <th>평가 손익</th>
                </tr>
              </thead>
              <tbody id="holdingsBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <footer class="foot">
      <div class="foot__inner">학습용 데모 · 토스증권 디자인 스타일</div>
    </footer>

    <script type="module" src="./assets/portfolio.js"></script>
    <script type="module" src="./assets/pwa.js"></script>
    <script type="module" src="./assets/web-vitals.js"></script>
  </body>
</html>
