name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npx eslint "assets/*.js" "script.js" "tests/*.mjs" "eslint.config.js"

      - name: Format check
        run: npx prettier --check "**/*.{js,css,html,json,md}" --ignore-path .gitignore

      - name: Unit tests
        run: node --test tests/unit.mjs

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -av \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=tests \
            --exclude=_site \
            --exclude=package-lock.json \
            --exclude=ROADMAP.md \
            --exclude=CONTRIBUTING.md \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
